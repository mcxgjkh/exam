<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <style>
            body {
                background-color: rgba(0, 0, 0, 0.8);
                display: flex;
                justify-content: center;
                align-items: center;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            .warning {
                display: flex;
                justify-content: center;
                align-items: center;
                position: absolute;
                max-width: 500px;
                width: 90%;
                padding: 32px 24px;
                background-color: rgb(255, 255, 255);
                border-radius: 28px;
                text-align: center;
            }
            .notext {
                color: rgb(160, 160, 160);
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }
            .link-out {
                background-color: rgba(188, 188, 188, 0.664);
                border-radius: 5px;
                padding: 1px 0px 2px;
                color: black;
            }
            .warning-close {
                background: #1f4f73;
                color: white;
                border: none;
                padding: 12px 30px;
                border-radius: 50px;
                font-size: 1rem;
                font-weight: 500;
                cursor: pointer;
                transition: 0.15s;
            }
            .warning-close:hover {
                background: #123a57;
                transform: translateY(-2px);
                box-shadow: 0px 10px 20px -10px #2f86b3;
            }
        </style>
        <script>
            function togo()
            {
                window.location.replace("https://exam.bh6rkw.dpdns.org")
            }
        </script>
    </head>
    <body>
        <div id="warning" class="warning">
            <div class="warning-content">
                <h1>警告</h1>
                <h2 style="color: rgb(211, 0, 0);">您刚刚访问的是盗版网站</h2>
                <h3>您已被自动重定向至正版网页提醒页</h3>
                <p>本系统由BH6RKW独立制作，您可以前往正版网站<br><span class="link-out"><span class="notext">“&ensp;</span><span class="link">exam.bh6rkw.dpdns.org</span><span class="notext">&ensp;”</span></span><br>来继续刷题和模拟</p>
                <button class="warning-close" onclick="togo()">立即前往</button>
            </div>
        </div>
    </body>
</html>
