<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>业无考试</title>
    <link rel="stylesheet" href="/watch/style.css?v=3.10.5.20260504_beta.1">
</head>
<body>
    <div id="app">
        <div id="header"><span id="title-text">业余无线电考试</span></div>
        <div id="content"></div>
    </div>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <div id="loading-msg">加载中</div>
    </div>
    <div id="order-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title">选择练习顺序</div>
            <button class="btn" data-order="asc">顺序</button>
            <button class="btn" data-order="desc">倒序</button>
            <button class="btn" data-order="random">乱序</button>
            <button class="btn danger" id="modal-cancel">取消</button>
        </div>
    </div>
    <script src="/watch/script.js?v=3.10.5.20260504_beta.1"></script>
</body>
</html>
