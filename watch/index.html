<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>业无考试</title>
    <link rel="stylesheet" href="/watch/style.css?v=1.3.1">
</head>
<body>
    <div id="app">
        <div id="header">
            <span id="title-text">业余无线电考试</span>
            <div style="font-size:6px; color:#8e9aaf; margin-top:1px;">Watch1.3.2</div>
        </div>
        <div id="content"></div>
    </div>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <div id="loading-msg">加载中</div>
    </div>
    <div id="order-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title">选择练习顺序</div>
            <button class="btn" data-order="asc">顺序</button>
            <button class="btn" data-order="desc">倒序</button>
            <button class="btn" data-order="random">乱序</button>
            <button class="btn danger" id="modal-cancel">取消</button>
        </div>
    </div>
    <button id="theme-toggle" style="position:fixed; bottom:12px; right:12px; width:34px; height:34px; border:none; background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; line-height:1; z-index:9999; border:1px solid rgba(255,255,255,0.4); box-shadow:0 2px 8px rgba(0,0,0,0.12); color:#333; padding:0; outline:none;">
        <span id="theme-icon">☀</span>
    </button>
    <script src="/watch/script.js?v=1.3.1"></script>
</body>
</html>
